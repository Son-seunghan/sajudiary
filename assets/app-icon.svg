<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 진한 남색 외곽 (먹빛 깊은 남색) -->
    <linearGradient id="navyBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2c54"/>
      <stop offset="100%" stop-color="#0e1830"/>
    </linearGradient>
    <!-- 한지 톤 -->
    <linearGradient id="paperFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f1da"/>
      <stop offset="100%" stop-color="#f0e6c8"/>
    </linearGradient>
    <!-- 한지 결 (얇은 노이즈) -->
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.45 0 0 0 0 0.35 0 0 0 0 0.20 0 0 0 0.06 0"/>
    </filter>
  </defs>

  <!-- 외곽 남색 -->
  <rect width="512" height="512" fill="url(#navyBorder)"/>

  <!-- 안쪽 한지 영역 -->
  <rect x="28" y="28" width="456" height="456" fill="url(#paperFill)" rx="6"/>
  <rect x="28" y="28" width="456" height="456" filter="url(#paperNoise)" opacity="0.55" rx="6"/>

  <!-- 멀리 산 실루엣 (옅게) -->
  <g opacity="0.14" fill="#3a4255">
    <path d="M 28 405 Q 80 360 130 380 T 215 360 T 300 395 T 380 370 T 484 395 L 484 484 L 28 484 Z"/>
  </g>
  <g opacity="0.10" fill="#5a6275">
    <path d="M 28 430 Q 95 405 155 420 T 270 405 T 365 425 T 484 425 L 484 484 L 28 484 Z"/>
  </g>

  <!-- 학 두 마리 (좌상단) -->
  <g fill="none" stroke="#1d2c54" stroke-width="1.8" opacity="0.35" stroke-linecap="round">
    <path d="M 82 138 q 8 -5 14 -1 l 8 3 m -8 -3 q 6 4 12 4 m -12 -4 l 8 6"/>
    <path d="M 122 162 q 8 -5 14 -1 l 7 2 m -7 -2 q 5 4 11 4 m -11 -4 l 7 6"/>
  </g>

  <!-- 한옥 처마 (우상단 작게) -->
  <g opacity="0.20" fill="none" stroke="#9b7728" stroke-width="1.4">
    <path d="M 380 60 q 25 -12 50 0 q -25 6 -50 0"/>
    <path d="M 400 76 q 18 -10 40 0"/>
    <path d="M 415 92 q 12 -8 28 0"/>
  </g>

  <!-- 한자 큰 글씨 — 四柱 / 日記 (세로 배치) -->
  <g fill="#1a2848">
    <!-- 위: 四柱 -->
    <text x="256" y="222"
          font-family="'Shilla Culture', 'Noto Serif KR', 'Source Han Serif KR', 'Nanum Myeongjo', serif"
          font-size="148" font-weight="900"
          text-anchor="middle" letter-spacing="14">四柱</text>
    <!-- 아래: 日記 -->
    <text x="256" y="380"
          font-family="'Shilla Culture', 'Noto Serif KR', 'Source Han Serif KR', 'Nanum Myeongjo', serif"
          font-size="148" font-weight="900"
          text-anchor="middle" letter-spacing="14">日記</text>
  </g>

  <!-- 도메인 작게 -->
  <text x="256" y="450"
        font-family="'Pretendard', 'Noto Sans KR', system-ui, sans-serif"
        font-size="20" fill="#1a2848"
        text-anchor="middle" letter-spacing="3" opacity="0.65">sajudiary.com</text>
</svg>
